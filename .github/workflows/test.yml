name: Tests

on:
  push:
    branches: [master, main, "v*"]
  pull_request:
    branches: [master, main]

jobs:
  bats:
    name: Bats unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run policy-decide tests
        run: bats --tap zeroclaw/tests/policy_decide.bats

  shellcheck:
    name: ShellCheck lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint policy-decide.sh
        run: shellcheck -s sh zeroclaw/lib/policy-decide.sh
