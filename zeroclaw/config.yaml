name: ZeroClaw Agent
version: 0.2.0
slug: zeroclaw
description: Lightweight AI agent for home automation
url: https://github.com/Nafjan/zeroclaw-ha-addon
arch:
  - aarch64
init: false
startup: application
boot: auto
options:
  openrouter_api_key: ""
  ha_token: ""
  telegram_bot_token: ""
  telegram_allowed_users: ""
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  default_model: deepseek/deepseek-chat-v3-0324
  complex_model: anthropic/claude-sonnet-4
  log_level: info
schema:
  openrouter_api_key: password
  ha_token: password
  telegram_bot_token: password
  telegram_allowed_users: str
  mqtt_host: str
  mqtt_port: port
  default_model: str
  complex_model: str
  log_level: list(debug|info|warn|error)
